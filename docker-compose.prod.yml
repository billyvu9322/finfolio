# Production stack for a VM that already has PostgreSQL + a Cloudflare Tunnel.
# No `db` (external PG via DATABASE_URL), no `nginx` (tunnel terminates TLS).
services:
  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      API_PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8080:80"
