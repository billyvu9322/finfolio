name: ${SERVICE_NAME:-finfolio}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the SPA at build time. Same-origin default ("/v1") works when
        # the API serves the SPA and a Cloudflare Tunnel fronts this single service.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/v1}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${API_PORT:-3000}
      # Existing PostgreSQL on the VM host (not a container).
      # From inside the container, host.docker.internal resolves to the host (extra_hosts below),
      # e.g. DATABASE_URL=postgresql://user:pass@host.docker.internal:5432/finfolio
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      ENABLE_PRICE_SCHEDULER: ${ENABLE_PRICE_SCHEDULER:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # API serves the built SPA from this path inside the image.
      WEB_STATIC_DIR: /app/apps/web/dist
      # Optional external integrations (leave blank if unused).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      EXCHANGERATE_API_KEY: ${EXCHANGERATE_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
    extra_hosts:
      # Linux: lets host.docker.internal resolve to the VM host IP (for the host PostgreSQL).
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    restart: unless-stopped
