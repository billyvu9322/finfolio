services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finfolio}
      POSTGRES_DB: ${POSTGRES_DB:-finfolio}
    ports:
      - "5432:5432"
    volumes:
      - ./.docker/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-finfolio}:${POSTGRES_PASSWORD:-finfolio}@db:5432/${POSTGRES_DB:-finfolio}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    ports:
      - "3000:3000"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/v1}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

# nginx reverse proxy (single-host MVP) — add a `proxy` service here when ready.
